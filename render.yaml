databases:
  - name: troop-licences-staging-db
    databaseName: troop_licences_staging
    user: troop_licences_staging_user
    plan: basic-1gb

services:
  - type: web
    name: troop-licences-staging
    env: node
    plan: starter
    region: ohio
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /analytics.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: LICENSE_MODE
        value: mock
      - key: whiteList
        value: '[]'
      - key: DATABASE_URL
        fromDatabase:
          name: troop-licences-staging-db
          property: connectionString
      - key: partnerId
        sync: false
      - key: partnerToken
        sync: false
